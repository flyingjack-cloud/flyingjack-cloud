name: Renovate

on:
  schedule:
    # 每天凌晨跑一次，检测 auth-service/third-party-service/wms-cashier
    # 三个仓库里 common-lib 依赖是否有新发布的版本，有的话自动开 PR bump 版本号
    - cron: '0 3 * * *'
  workflow_dispatch:

jobs:
  renovate:
    runs-on: self-hosted

    steps:
      - name: Checkout flyingjack-cloud root
        uses: actions/checkout@v4

      # PACKAGES_TOKEN 是 classic PAT（write:packages，自动带 repo scope）：
      # 一部分作用是给 Renovate 开 PR 用的仓库权限，一部分是给 hostRules 认证
      # maven.pkg.github.com 用的，读取 common-lib 有没有发布新版本
      - name: Self-hosted Renovate
        uses: renovatebot/github-action@v40
        with:
          configurationFile: renovate-config.json
          token: ${{ secrets.PACKAGES_TOKEN }}
        env:
          RENOVATE_HOST_RULES: >-
            [{"hostType":"maven","matchHost":"maven.pkg.github.com","username":"renovate","password":"${{ secrets.PACKAGES_TOKEN }}"}]
