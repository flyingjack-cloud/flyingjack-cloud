## 业务异常
error.business.default=Unsuccessful, try again.
error.business.sentinel.flow=Service is busy now, try again later.
error.business.conflict = Already exist

## 常用异常
error.common.param.invalid=Bad Request
error.common.param.miss=Missing required field
error.common.param.miss-captcha=Missing valid captcha

# Spring Security阶段的异常
# 401
error.security.authenticated.default=Full authentication is required
error.security.authenticated.bad-credential=Bad authentication information
error.security.authenticated.authenticated.over-attempt=To many attempt, wait 5 minutes
error.security.authenticated.invalid-account=Unavailable account(Locked/disabled/expired)
error.security.authenticated.expired-credential=Expired credential, please reset
error.security.authenticated.authenticated.internal=Internal Server Error
error.security.authenticated.authenticated.insufficient=Unauthorized

# 403
error.security.access-denied.default=Access denied, check authentication

# OAuth2
error.oauth2.default=Forbidden
error.oauth2.client.miss=Client not found

## 其他
error.system.fail=System error, contact administrator.
error.system.unknown=Unknown error, try again.
