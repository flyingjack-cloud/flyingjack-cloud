## 业务异常
error.business.default=处理出现错误
error.business.sentinel.flow=服务正忙，请稍后再试
error.business.conflict = 已存在

## 常用异常
error.common.param.invalid=请求参数出错
error.common.param.miss=缺少请求参数
error.common.param.miss-captcha=缺少验证码或者不正确

# Spring Security阶段的异常
# 401
error.security.authenticated.default=认证信息不足
error.security.authenticated.bad-credential=账号或密码错误
error.security.authenticated.authenticated.over-attempt=尝试太多次，请等待一会儿再试
error.security.authenticated.invalid-account=账号已过期或停用
error.security.authenticated.expired-credential=密码已过期，请重置密码
error.security.authenticated.authenticated.internal=认证失败
error.security.authenticated.authenticated.insufficient=认证信息不足

# 403
error.security.access-denied.default=未发现认证信息, 请尝试重新登录

# OAuth2
error.oauth2.default=禁止访问
error.oauth2.client.miss=客户端不存在

## 其他
error.system.fail=系统错误，请联系管理员
error.system.unknown=未知错误

