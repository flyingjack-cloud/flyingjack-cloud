spring:
  application:
    name: auth
  cloud:
    nacos:
      discovery:
        namespace: flyingjack-${spring.profiles.active} # 根据激活环境使用不同的命名空间
        server-addr: ${NACOS_HOST:127.0.0.1}:8848
      config:
        server-addr: ${NACOS_HOST:127.0.0.1}:8848
        namespace: flyingjack-${spring.profiles.active} # 根据激活环境使用不同的命名空间
        group: DEFAULT_GROUP
        file-extension: yaml
        # 额外配置文件
        shared-configs:
          - data-id: connect.yml
            group: COMMON_GROUP
            refresh: false

